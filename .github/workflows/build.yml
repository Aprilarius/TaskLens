name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TaskLens.csproj

      - name: Build
        run: dotnet build TaskLens.csproj --configuration Release --no-restore

      - name: Publish single-file executable
        run: dotnet publish TaskLens.csproj --configuration Release --runtime win-x64 --self-contained true --no-restore --output artifacts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskLens-win-x64
          path: artifacts/TaskLens.exe
          if-no-files-found: error
